<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIII C | Serviam Digital</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --bg: #050505; --card: #111; --accent: #ffffff; --tiktok: #ff0050; --ig: #E1306C; --anon: #00f2ea; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- PREMIUM LOADING SCREEN --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 99999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-content { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .loader-logo { 
            width: 140px; height: 140px; object-fit: cover; border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.1);
            animation: logoScale 1.5s infinite alternate ease-in-out;
        }
        .loader-text { color: #fff; font-size: 1.2rem; font-weight: 900; letter-spacing: 8px; text-transform: uppercase; opacity: 0.8; }
        .loader-bar-container { width: 180px; height: 2px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; border-radius: 2px; }
        .loader-bar-fill { 
            position: absolute; width: 0; height: 100%; background: #fff; 
            animation: loadingProgress 2.5s forwards cubic-bezier(0.65, 0, 0.35, 1); 
        }
        @keyframes logoScale { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.05); opacity: 1; } }
        @keyframes loadingProgress { to { width: 100%; } }
        .loaded #loader { opacity: 0; visibility: hidden; }

        /* --- NAVIGATION --- */
        .page { display: none; min-height: 100vh; }
        .active-page { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- HERO --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('IMG-20260224-WA0029.jpg');
            background-size: cover; background-position: center; background-attachment: fixed; text-align: center;
        }
        .hero h1 { font-size: clamp(2.5rem, 10vw, 8rem); font-weight: 900; letter-spacing: -4px; line-height: 0.85; text-transform: uppercase; margin-bottom: 25px; }
        .btn-nav { padding: 14px 25px; border: 1px solid white; color: white; text-decoration: none; border-radius: 50px; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; background: none; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-nav:hover { background: white; color: black; }

        /* --- CONTENT --- */
        .main-content { max-width: 1100px; margin: 0 auto; padding: 80px 20px; }
        .section-header { text-align: center; margin-bottom: 50px; }
        .section-header h2 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; }

        /* --- MAPS BOX --- */
        .maps-box { width: 100%; height: 450px; border-radius: 30px; overflow: hidden; border: 1px solid #222; filter: grayscale(1) invert(0.9); transition: 0.5s; margin-top: 20px; }
        .maps-box:hover { filter: grayscale(0) invert(0); }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- FORMS & FEED --- */
        .form-box { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid #222; margin-bottom: 40px; }
        input, select, textarea { width: 100%; background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 12px; color: white; margin-top: 10px; outline: none; }
        .feed-card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 20px; position: relative; }
        
        .nav-header { padding: 20px; position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        footer { text-align: center; padding: 80px 20px; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <img src="images.jpeg" class="loader-logo">
            <div class="loader-text">VIII C</div>
            <div class="loader-bar-container"><div class="loader-bar-fill"></div></div>
        </div>
    </div>

    <div id="home-page" class="page active-page">
        <header class="hero">
            <div style="font-size:0.7rem; letter-spacing:5px; opacity:0.6; margin-bottom:10px;">TA 2025/2026</div>
            <h1>WELCOME TO<br>VIII C</h1>
            <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
                <button class="btn-nav" onclick="showPage('tugas-page')">CLASS FEED</button>
                <button class="btn-nav" style="border-color:var(--anon); color:var(--anon);" onclick="showPage('anon-page')">ANON MESSAGE</button>
            </div>
        </header>

        <main class="main-content">
            <section class="section-header"><h2>SCHOOL MAPS</h2></section>
            <div class="maps-box">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.475171738475!2d124.31510927501256!3d0.7486422625290234!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x32e33d69385a6d39%3A0xffe6b4d619b164f0!2sKampus%20SMP-SMA%20Katolik%20Theodorus!5e0!3m2!1sid!2sid!4v1713758000000!5m2!1sid!2sid" 
                    allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </main>

        <footer>
            <div class="credit" style="font-size:0.6rem; color:#444; letter-spacing:2px;">Created by <b>Nama Kamu</b></div>
        </footer>
    </div>

    <div id="tugas-page" class="page">
        <nav class="nav-header">
            <button onclick="showPage('home-page')" style="background:none; border:none; color:white; cursor:pointer;">← BACK</button>
            <span style="font-size:0.7rem; font-weight:800; letter-spacing:2px;">CLASS FEED</span>
        </nav>
        <div class="main-content" style="max-width: 700px;">
            <div class="form-box">
                <input type="text" id="sender" placeholder="Nama lo...">
                <select id="subject">
                    <option>Pancasila (PKN)</option>
                    <option>TIK/JU</option>
                    <option>B.INGG/IT</option>
                    <option>AGAMA</option>
                    <option>IPS</option>
                    <option>SENI</option>
                </select>
                <textarea id="msg" placeholder="Info tugas..."></textarea>
                <button class="btn-nav" style="width:100%; justify-content:center; background:white; color:black; margin-top:15px;" onclick="postFeed('feed')">POST</button>
            </div>
            <div id="feed-container"></div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => setTimeout(() => document.body.classList.add('loaded'), 2500));
        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
        }
        // Logic Simpan Data sama seperti sebelumnya...
    </script>
</body>
</html>
