<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIII C | Serviam Digital</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --bg: #050505; --card: #111; --accent: #ffffff; --tiktok: #ff0050; --ig: #E1306C; --anon: #00f2ea; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- ULTIMATE GLITCH LOADING SCREEN --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 99999;
            transition: opacity 1.2s cubic-bezier(0.7, 0, 0.3, 1), visibility 1.2s;
        }
        #loader::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px; animation: moveBg 20s linear infinite; opacity: 0.3;
        }
        .loader-content { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 25px; position: relative; z-index: 2; }
        .loader-logo {
            width: 150px; height: 150px; object-fit: cover; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1); box-shadow: 0 0 50px rgba(255,255,255,0.15);
            animation: logoFloat 3s ease-in-out infinite, logoEntry 1.5s cubic-bezier(0.2, 1, 0.2, 1) forwards; opacity: 0;
        }
        .loader-text { color: #fff; font-size: 1.5rem; font-weight: 900; letter-spacing: 20px; text-transform: uppercase; opacity: 0; animation: textReveal 1.2s 0.5s forwards; }
        .loader-bar-container { width: 220px; height: 2px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; margin-top: 10px; opacity: 0; animation: fadeIn 0.8s 1s forwards; }
        .loader-bar-fill { position: absolute; top: 0; left: 0; width: 0; height: 100%; background: #fff; animation: loadingProgress 2.5s 1s forwards; }

        @keyframes logoEntry { 0% { opacity: 0; transform: scale(0.5); filter: blur(10px); } 100% { opacity: 1; transform: scale(1); filter: blur(0); } }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes textReveal { 0% { opacity: 0; letter-spacing: 40px; } 100% { opacity: 0.8; letter-spacing: 10px; } }
        @keyframes loadingProgress { to { width: 100%; } }
        @keyframes moveBg { from { transform: translate(0,0); } to { transform: translate(-50px, -50px); } }
        @keyframes fadeIn { to { opacity: 1; } }
        .loaded #loader { opacity: 0; visibility: hidden; }

        /* --- UI COMPONENTS --- */
        .page { display: none; min-height: 100vh; }
        .active-page { display: block; animation: fadeIn 0.5s ease; }
        
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('IMG-20260224-WA0029.jpg');
            background-size: cover; background-position: center; background-attachment: fixed; text-align: center;
        }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 7rem); font-weight: 900; letter-spacing: -3px; text-transform: uppercase; line-height: 0.9; }
        
        .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 30px; padding: 0 20px; }
        .btn-nav { padding: 12px 24px; border: 1px solid white; color: white; text-decoration: none; border-radius: 50px; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; background: none; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-nav:hover { background: white; color: black; }

        .main-content { max-width: 1100px; margin: 0 auto; padding: 80px 20px; }
        .section-header { text-align: center; margin-bottom: 50px; }
        .section-header h2 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; }

        /* MOMENTS CUBE */
        .moments-container { width: 100%; max-width: 400px; margin: 0 auto; padding-bottom: 50px; }
        .swiper-moments { width: 100%; height: 400px; border-radius: 20px; }
        .swiper-moments img { width: 100%; height: 100%; object-fit: cover; }

        /* TABLES */
        .table-box { background: var(--card); border: 1px solid #222; border-radius: 20px; overflow: hidden; margin-bottom: 50px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #222; font-size: 0.9rem; }

        /* MAPS */
        .maps-box { width: 100%; height: 450px; border-radius: 30px; overflow: hidden; border: 1px solid #222; filter: grayscale(1) invert(0.9); transition: 0.5s; }
        .maps-box:hover { filter: grayscale(0) invert(0); }
        iframe { width: 100%; height: 100%; border: none; }

        .nav-header { padding: 20px; position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .form-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #222; margin-bottom: 30px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; border-radius: 10px; color: white; margin-top: 10px; outline: none; }
        .feed-card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <img src="Screenshot_20260422-091239_WhatsApp.jpg" class="loader-logo">
            <div class="loader-text">VIII C</div>
            <div class="loader-bar-container"><div class="loader-bar-fill"></div></div>
        </div>
    </div>

    <div id="home-page" class="page active-page">
        <header class="hero">
            <div style="letter-spacing:5px; opacity:0.5; font-size:0.7rem; margin-bottom:10px;">SERVIAM — TA 2025/2026</div>
            <h1>WELCOME TO<br>CLASS VIII C</h1>
            <div class="nav-buttons">
                <button class="btn-nav" onclick="showPage('tugas-page')"><i class="fa-solid fa-paper-plane"></i> FEED</button>
                <button class="btn-nav" onclick="showPage('anon-page')" style="border-color:var(--anon); color:var(--anon);"><i class="fa-solid fa-user-secret"></i> ANON</button>
                <a href="https://www.tiktok.com/@eightc_kthdoz" target="_blank" class="btn-nav"><i class="fa-brands fa-tiktok"></i> TIKTOK</a>
                <a href="https://www.instagram.com/8c.smptheodorus" target="_blank" class="btn-nav"><i class="fa-brands fa-instagram"></i> IG</a>
            </div>
        </header>

        <main class="main-content">
            <section class="section-header"><h2>CLASS MOMENTS</h2></section>
            <div class="moments-container">
                <div class="swiper swiper-moments">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide"><img src="IMG-20250814-WA0058.jpg"></div>
                        <div class="swiper-slide"><img src="IMG-20251111-WA0071.jpg"></div>
                        <div class="swiper-slide"><img src="IMG-20251111-WA0103.jpg"></div>
                        <div class="swiper-slide"><img src="IMG-20251124-WA0011.jpg"></div>
                        <div class="swiper-slide"><img src="IMG-20260127-WA0049.jpg"></div>
                        <div class="swiper-slide"><img src="IMG-20260417-WA0010.jpg"></div>
                    </div>
                </div>
            </div>

            <section class="section-header"><h2>DAFTAR SISWA</h2></section>
            <div class="table-box">
                <table>
                    <tbody id="list-siswa"></tbody>
                </table>
            </div>

            <section class="section-header"><h2>LOCATION</h2></section>
            <div class="maps-box">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.123!2d124.3123!3d0.7234!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x327e366666666667%3A0x7777777777777777!2sSMP%20Katolik%20Theodorus!5e0!3m2!1sid!2sid!4v17000000000007" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </main>
        
        <footer style="text-align:center; padding:40px; opacity:0.4; font-size:0.6rem; letter-spacing:2px;">
            VIII C THEODORUS KOTAMOBAGU<br>Created by Nama Kamu
        </footer>
    </div>

    <div id="tugas-page" class="page">
        <nav class="nav-header"><button onclick="showPage('home-page')" style="background:none; border:none; color:white;">← BACK</button><span>CLASS FEED</span></nav>
        <div class="main-content" style="max-width:700px;">
            <div class="form-box">
                <input type="text" id="sender" placeholder="Nama lo...">
                <select id="subject"><option>TIK/JU</option><option>Pancasila</option><option>Matematika</option><option>B.Inggris</option></select>
                <textarea id="msg" placeholder="Info..."></textarea>
                <button class="btn-nav" style="width:100%; justify-content:center; background:white; color:black; margin-top:10px;" onclick="post('feed')">POST</button>
            </div>
            <div id="feed-container"></div>
        </div>
    </div>

    <div id="anon-page" class="page">
        <nav class="nav-header"><button onclick="showPage('home-page')" style="background:none; border:none; color:white;">← BACK</button><span>ANON CHAT</span></nav>
        <div class="main-content" style="max-width:700px;">
            <div class="form-box"><textarea id="amsg" placeholder="Pesan rahasia..."></textarea><button class="btn-nav" style="width:100%; justify-content:center; border-color:var(--anon); color:var(--anon); margin-top:10px;" onclick="post('anon')">SEND ANON</button></div>
            <div id="anon-container"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
                new Swiper('.swiper-moments', { effect: 'cube', loop: true, autoplay: {delay:3000} });
            }, 3500);
        });

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            window.scrollTo(0,0);
        }

        const names = ["Abigail L. Wowor", "Bosco B. Kuntag", "Evelyn M. Prasetya", "Gabriela H. Rumagit", "Gabrielle F. Rondonuwu", "Gracyella S. Watuseke", "Injiltia T. Maratade", "Ivy R. X. Piri", "Jillian I. Rondonuwa", "Joachim L. Rerung", "Jonathan M. Gunadi", "Kayla D. T. Mantiri", "Kimberly G. Tamba", "Kingsley A. Monde", "Laurency I. B. Tuela", "Lionel J. Kojongian", "Maria F. G. Polla", "Michaela L. N. Pelealzu", "Michayla N. Rori", "Nathanael B. Lambayang", "Qimberly L. L. Lonton", "Queennovi Daraung", "Raylene L. L. Pranata", "Riven C. A. Moningka", "Russel Carundeng", "Stacey E. D. Ratag", "Theresia D. J. K. Mundung", "Toar G. Pieter", "Valentino Mogot", "Whitney V. R. Liono"];
        const tb = document.getElementById('list-siswa');
        names.forEach((n, i) => tb.innerHTML += `<tr><td style="color:#555;">${i+1}</td><td>${n}</td></tr>`);

        function post(type) {
            let n = type==='feed' ? document.getElementById('sender').value : "Anonim";
            let m = type==='feed' ? document.getElementById('msg').value : document.getElementById('amsg').value;
            if(!m) return;
            const db = JSON.parse(localStorage.getItem('8C_DB')) || [];
            db.push({n, m, type, date: new Date().toLocaleString()});
            localStorage.setItem('8C_DB', JSON.stringify(db));
            location.reload();
        }

        function load() {
            const db = (JSON.parse(localStorage.getItem('8C_DB')) || []).reverse();
            db.forEach(t => {
                const target = t.type === 'feed' ? 'feed-container' : 'anon-container';
                document.getElementById(target).innerHTML += `<div class="feed-card"><b>${t.n}</b><p style="margin-top:10px; color:#ccc;">${t.m}</p><small style="font-size:0.6rem; color:#444;">${t.date}</small></div>`;
            });
        }
        load();
    </script>
</body>
</html>
