<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIII C | Serviam Digital</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --bg: #050505; --card: #111; --accent: #ffffff; --tiktok: #ff0050; --ig: #E1306C; --anon: #00f2ea; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; scroll-behavior: smooth; width: 100%; height: 100%; }

        /* =========================================
           --- ULTIMATE GLITCH LOADING SCREEN ---
           ========================================= */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 99999;
            transition: opacity 1.2s cubic-bezier(0.7, 0, 0.3, 1), visibility 1.2s;
            overflow: hidden;
        }

        /* Efek Partikel Halus di Background Loader */
        #loader::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBg 20s linear infinite;
            opacity: 0.3;
        }

        .loader-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            position: relative;
            z-index: 2;
        }

        /* Gaya Logo dengan Efek Glitch & Glow */
        .loader-logo {
            width: 160px; height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 50px rgba(255,255,255,0.15);
            animation: logoFloat 3s ease-in-out infinite, logoEntry 1.5s cubic-bezier(0.2, 1, 0.2, 1) forwards;
            opacity: 0;
        }

        /* Teks "VIII C" dengan Animasi Letter Spacing */
        .loader-text {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 20px;
            text-transform: uppercase;
            opacity: 0;
            margin-right: -20px; /* Offset spacing */
            animation: textReveal 1.2s 0.5s cubic-bezier(0.2, 1, 0.2, 1) forwards;
        }

        /* Bar Progress dengan Efek Neon Scan */
        .loader-bar-container {
            width: 250px; height: 3px;
            background: rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            opacity: 0;
            animation: fadeIn 0.8s 1s forwards;
        }

        .loader-bar-fill {
            position: absolute; top: 0; left: 0; width: 0; height: 100%;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            background-size: 200% 100%;
            animation: loadingProgress 2.5s 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Animasi Keyframes */
        @keyframes logoEntry { 
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0); }
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); box-shadow: 0 0 40px rgba(255,255,255,0.1); }
            50% { transform: translateY(-15px); box-shadow: 0 20px 60px rgba(255,255,255,0.2); }
        }
        @keyframes textReveal {
            0% { opacity: 0; letter-spacing: 40px; filter: blur(10px); }
            100% { opacity: 0.8; letter-spacing: 10px; filter: blur(0); }
        }
        @keyframes loadingProgress {
            0% { width: 0; background-position: 200% 0; }
            100% { width: 100%; background-position: -200% 0; }
        }
        @keyframes moveBg { from { transform: translate(0,0); } to { transform: translate(-50px, -50px); } }
        @keyframes fadeIn { to { opacity: 1; } }

        .loaded #loader { opacity: 0; visibility: hidden; pointer-events: none; }

        /* =========================================
           --- SISA CSS UTAMA (DIPERTAHANKAN) ---
           ========================================= */
        .page { display: none; min-height: 100vh; }
        .active-page { display: block; animation: fadeIn 0.5s ease; }
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('IMG-20260224-WA0029.jpg');
            background-size: cover; background-position: center; background-attachment: fixed; text-align: center;
        }
        .hero h1 { font-size: clamp(2.5rem, 10vw, 7rem); font-weight: 900; letter-spacing: -3px; line-height: 0.9; text-transform: uppercase; margin-bottom: 25px; }
        .btn-nav { padding: 14px 28px; border: 1px solid white; color: white; text-decoration: none; border-radius: 50px; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; background: none; transition: 0.4s; display: flex; align-items: center; gap: 8px; }
        .btn-nav:hover { background: white; color: black; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .main-content { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        .maps-box { width: 100%; height: 450px; border-radius: 30px; overflow: hidden; border: 1px solid #222; filter: grayscale(1) invert(0.9); transition: 0.8s ease; margin-top: 20px; }
        .maps-box:hover { filter: grayscale(0) invert(0); }
        iframe { width: 100%; height: 100%; border: none; }
        .form-box { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid #222; margin-bottom: 40px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; border-radius: 12px; color: white; margin-top: 10px; outline: none; }
        .feed-card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 25px; margin-bottom: 20px; position: relative; }
        .nav-header { padding: 20px; position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        footer { text-align: center; padding: 60px 20px; opacity: 0.5; font-size: 0.7rem; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <img src="Screenshot_20260422-091239_WhatsApp.jpg" class="loader-logo" alt="Logo VIII C">
            <div class="loader-text">VIII C</div>
            <div class="loader-bar-container">
                <div class="loader-bar-fill"></div>
            </div>
        </div>
    </div>

    <div id="home-page" class="page active-page">
        <header class="hero">
            <div style="font-size:0.8rem; letter-spacing:6px; opacity:0.5; margin-bottom:15px;">EST. 2025 — VIII C</div>
            <h1>THEODORUS<br>DIGITAL HUB</h1>
            <div style="display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:10px;">
                <button class="btn-nav" onclick="showPage('tugas-page')">CLASS FEED</button>
                <button class="btn-nav" style="border-color:var(--anon); color:var(--anon);" onclick="showPage('anon-page')">ANON CHAT</button>
            </div>
        </header>

        <main class="main-content">
            <section class="section-header">
                <p style="color:#555; letter-spacing:4px; font-size:0.7rem; text-transform:uppercase;">Navigation</p>
                <h2>SCHOOL LOCATION</h2>
            </section>
            <div class="maps-box">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.1!2d124.3176!3d0.7486!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x327e39a368b65d39%3A0xf8e6b4d619b064f0!2sSMP%20Katolik%20Theodorus!5e0!3m2!1sid!2sid!4v1713750000000!5m2!1sid!2sid" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </main>

        <footer>
            <div>VIII C SERVIAM &copy; 2026</div>
            <div style="margin-top:8px;">Created by <b>Nama Kamu</b></div>
        </footer>
    </div>

    <div id="tugas-page" class="page">
        <nav class="nav-header">
            <button onclick="showPage('home-page')" style="background:none; border:none; color:white; cursor:pointer; font-size:0.7rem; letter-spacing:2px;">← BACK</button>
            <span style="font-size:0.7rem; font-weight:900; letter-spacing:3px;">CLASS FEED</span>
        </nav>
        <div class="main-content" style="max-width: 750px;">
            <div class="form-box">
                <input type="text" id="sender" placeholder="Nama pengirim...">
                <select id="subject">
                    <option>Pancasila (PKN)</option>
                    <option>TIK/JU</option>
                    <option>B.INGG/IT</option>
                    <option>AGAMA</option>
                    <option>IPS</option>
                    <option>SENI</option>
                </select>
                <textarea id="msg" placeholder="Tulis tugas atau info penting..."></textarea>
                <button class="btn-nav" style="width:100%; justify-content:center; background:white; color:black; margin-top:15px;" onclick="postFeed('feed')">POST MESSAGE</button>
            </div>
            <div id="feed-container"></div>
        </div>
    </div>

    <script>
        // Logika Loading yang lebih halus
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 3500); // 3.5 Detik biar efek glitch terasa
        });

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            window.scrollTo(0,0);
        }

        // Logic Feed (Data tetap disimpan di LocalStorage)
        function postFeed(type) {
            let n = document.getElementById('sender').value;
            let m = document.getElementById('msg').value;
            let s = document.getElementById('subject').value;
            if(!n || !m) return alert("Lengkapi data!");
            
            const db = JSON.parse(localStorage.getItem('8C_DB_V9')) || [];
            db.push({id: Date.now(), n, m, s, date: new Date().toLocaleString()});
            localStorage.setItem('8C_DB_V9', JSON.stringify(db));
            location.reload();
        }

        function loadFeed() {
            const container = document.getElementById('feed-container');
            const db = (JSON.parse(localStorage.getItem('8C_DB_V9')) || []).reverse();
            db.forEach(t => {
                container.innerHTML += `
                    <div class="feed-card">
                        <span style="background:white; color:black; font-size:0.6rem; padding:4px 10px; border-radius:4px; font-weight:900; float:right;">${t.s}</span>
                        <b style="font-size:1rem;">${t.n}</b>
                        <p style="margin-top:15px; color:#ccc; line-height:1.6; white-space:pre-wrap;">${t.m}</p>
                        <div style="font-size:0.6rem; color:#444; margin-top:20px;">${t.date}</div>
                    </div>
                `;
            });
        }
        loadFeed();
    </script>
</body>
</html>
