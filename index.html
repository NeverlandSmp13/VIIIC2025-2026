<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIII C | Serviam Digital Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --bg: #050505; --card: #111; --accent: #ffffff; --tiktok: #ff0050; --ig: #E1306C; --anon: #00f2ea; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 99999;
            transition: opacity 1s ease, visibility 1s;
        }
        .loader-text { color: #fff; font-size: 2.5rem; font-weight: 900; letter-spacing: 15px; text-transform: uppercase; animation: pulse 2s infinite; margin-right: -15px; }
        .loader-bar-container { width: 180px; height: 1px; background: rgba(255,255,255,0.1); margin: 20px auto 0; position: relative; overflow: hidden; }
        .loader-bar-fill { position: absolute; top: 0; left: 0; width: 0; height: 100%; background: #fff; animation: loadFill 2s forwards; }
        @keyframes loadFill { to { width: 100%; } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .loaded #loader { opacity: 0; visibility: hidden; }

        /* --- UI PAGES --- */
        .page { display: none; min-height: 100vh; }
        .active-page { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('IMG-20260224-WA0029.jpg');
            background-size: cover; background-position: center; text-align: center;
        }
        .hero h1 { font-size: clamp(2rem, 8vw, 6.5rem); font-weight: 900; letter-spacing: -2px; text-transform: uppercase; line-height: 0.9; }
        .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 30px; padding: 0 20px; }
        .btn-nav { padding: 12px 24px; border: 1px solid white; color: white; text-decoration: none; border-radius: 50px; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; background: none; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-nav:hover { background: white; color: black; transform: translateY(-3px); }

        /* MAPS BOX */
        .maps-box { width: 100%; height: 450px; border-radius: 30px; overflow: hidden; border: 1px solid #222; filter: grayscale(1) invert(0.92); margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }

        .main-content { max-width: 1100px; margin: 0 auto; padding: 80px 20px; }
        .section-header { text-align: center; margin-bottom: 50px; }

        /* FEED CARDS */
        .feed-card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 25px; margin-bottom: 20px; position: relative; }
        .feed-card img { width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid #222; cursor: zoom-in; }
        .card-actions { position: absolute; bottom: 20px; right: 25px; display: flex; gap: 15px; align-items: center; }
        .btn-action { background: none; border: none; font-size: 0.75rem; cursor: pointer; opacity: 0.6; transition: 0.3s; color: white; display: flex; align-items: center; gap: 5px; }
        .btn-dl { color: #00f2ea; }
        .btn-del { color: #ff4d4d; }

        /* MODAL */
        #imageModal {
            display: none; position: fixed; z-index: 100000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); justify-content: center; align-items: center; cursor: zoom-out;
        }
        #modalImg { max-width: 90%; max-height: 90%; border-radius: 10px; }

        .table-box { background: var(--card); border: 1px solid #222; border-radius: 20px; overflow: hidden; margin-bottom: 50px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .form-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #222; margin-bottom: 30px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; border-radius: 10px; color: white; margin-top: 10px; outline: none; }
        .nav-header { padding: 20px; position: sticky; top: 0; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="imageModal" onclick="this.style.display='none'">
        <img id="modalImg">
    </div>

    <div id="loader">
        <div class="loader-text">VIII C</div>
        <div class="loader-bar-container"><div class="loader-bar-fill"></div></div>
    </div>

    <div id="home-page" class="page active-page">
        <header class="hero">
            <div style="letter-spacing:5px; opacity:0.5; font-size:0.7rem; margin-bottom:10px;">SERVIAM — TA 2025/2026</div>
            <h1>WELCOME TO<br>CLASS VIII C</h1>
            <div class="nav-buttons">
                <button class="btn-nav" onclick="showPage('tugas-page')">FEED KELAS</button>
                <button class="btn-nav" onclick="showPage('anon-page')" style="border-color:var(--anon); color:var(--anon);">ANON CHAT</button>
                <a href="https://www.tiktok.com/@eightc_kthdoz" target="_blank" class="btn-nav">TIKTOK</a>
                <a href="https://www.instagram.com/8c.smptheodorus" target="_blank" class="btn-nav">INSTAGRAM</a>
            </div>
        </header>

        <main class="main-content">
            <section class="section-header"><h2>DAFTAR SISWA</h2></section>
            <div class="table-box">
                <table><tbody id="list-siswa"></tbody></table>
            </div>

            <section class="section-header"><h2>LOCATION</h2></section>
            <div class="maps-box">
                <iframe 
                    src="https://maps.google.com/maps?q=SMP%20Katolik%20Theodorus%2C%20Kotamobagu&t=&z=17&ie=UTF8&iwloc=&output=embed" 
                    allowfullscreen 
                    loading="lazy">
                </iframe>
            </div>
        </main>
        
        <footer style="text-align:center; padding:40px; opacity:0.4; font-size:0.6rem; letter-spacing:2px; border-top:1px solid #111;">
            VIII C THEODORUS KOTAMOBAGU<br>Created by <b>Riven Moningka</b>
        </footer>
    </div>

    <div id="tugas-page" class="page">
        <nav class="nav-header"><button onclick="showPage('home-page')" style="background:none; border:none; color:white; cursor:pointer;">← BACK</button><span>CLASS FEED</span></nav>
        <div class="main-content" style="max-width:700px;">
            <div class="form-box">
                <input type="text" id="sender" placeholder="Nama Kamu...">
                <select id="subject" style="margin-top:10px;">
                    <option>Info Umum</option><option>Pancasila (PKN)</option><option>TIK / JU</option><option>B.Inggris / IT</option>
                    <option>Agama</option><option>IPS</option><option>Seni Budaya</option><option>Matematika</option><option>IPA</option><option>B. Indonesia</option>
                </select>
                <textarea id="msg" placeholder="Tulis info tugas..." style="height:100px; margin-top:10px;"></textarea>
                <input type="file" id="imgInput" accept="image/*" style="border:none; padding:10px 0;">
                <button class="btn-nav" style="width:100%; justify-content:center; background:white; color:black; margin-top:20px; font-weight:800;" onclick="postFeed()">POST KE FEED</button>
            </div>
            <div id="feed-container"></div>
        </div>
    </div>

    <div id="anon-page" class="page">
        <nav class="nav-header"><button onclick="showPage('home-page')" style="background:none; border:none; color:white; cursor:pointer;">← BACK</button><span>SECRET MESSAGE</span></nav>
        <div class="main-content" style="max-width:700px;">
            <div class="form-box">
                <textarea id="amsg" placeholder="Tulis pesan rahasia..."></textarea>
                <button class="btn-nav" style="width:100%; justify-content:center; border-color:var(--anon); color:var(--anon); margin-top:20px;" onclick="postAnon()">KIRIM ANONIM</button>
            </div>
            <div id="anon-container"></div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => { setTimeout(() => { document.body.classList.add('loaded'); }, 1500); });

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            window.scrollTo(0,0);
        }

        function openImg(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function downloadImg(src, name) {
            const link = document.createElement('a');
            link.href = src;
            link.download = `8C_Feed_${name.replace(/\s/g, '_')}_${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        const names = ["Abigail L. Wowor", "Bosco B. Kuntag", "Evelyn M. Prasetya", "Gabriela H. Rumagit", "Gabrielle F. Rondonuwu", "Gracyella S. Watuseke", "Injiltia T. Maratade", "Ivy R. X. Piri", "Jillian I. Rondonuwa", "Joachim L. Rerung", "Jonathan M. Gunadi", "Kayla D. T. Mantiri", "Kimberly G. Tamba", "Kingsley A. Monde", "Laurency I. B. Tuela", "Lionel J. Kojongian", "Maria F. G. Polla", "Michaela L. N. Pelealzu", "Michayla N. Rori", "Nathanael B. Lambayang", "Qimberly L. L. Lonton", "Queennovi Daraung", "Raylene L. L. Pranata", "Riven C. A. Moningka", "Russel Carundeng", "Stacey E. D. Ratag", "Theresia D. J. K. Mundung", "Toar G. Pieter", "Valentino Mogot", "Whitney V. R. Liono"];
        const tb = document.getElementById('list-siswa');
        names.forEach((n, i) => tb.innerHTML += `<tr><td style="color:#555; width:40px;">${i+1}</td><td>${n}</td></tr>`);

        function postFeed() {
            const n = document.getElementById('sender').value, m = document.getElementById('msg').value, s = document.getElementById('subject').value, i = document.getElementById('imgInput').files[0];
            if(!n || !m) return alert("Isi data!");
            if(i) {
                const r = new FileReader();
                r.onload = (e) => savePost({ n, m, s, img: e.target.result, type: 'feed' });
                r.readAsDataURL(i);
            } else { savePost({ n, m, s, img: null, type: 'feed' }); }
        }

        function postAnon() {
            const m = document.getElementById('amsg').value;
            if(!m) return alert("Kosong!");
            savePost({ n: "Seseorang 🤫", m, s: "Secret", img: null, type: 'anon' });
        }

        function savePost(data) {
            const db = JSON.parse(localStorage.getItem('8C_FINAL_DB_V2')) || [];
            db.push({ ...data, date: new Date().toLocaleString(), id: Date.now() });
            localStorage.setItem('8C_FINAL_DB_V2', JSON.stringify(db));
            location.reload();
        }

        function deletePost(id) {
            if(confirm("Hapus?")) {
                let db = JSON.parse(localStorage.getItem('8C_FINAL_DB_V2')) || [];
                db = db.filter(p => p.id !== id);
                localStorage.setItem('8C_FINAL_DB_V2', JSON.stringify(db));
                location.reload();
            }
        }

        function loadPosts() {
            const db = (JSON.parse(localStorage.getItem('8C_FINAL_DB_V2')) || []).reverse();
            db.forEach(t => {
                const card = `
                    <div class="feed-card">
                        <span style="float:right; background:white; color:black; font-size:0.6rem; padding:3px 8px; border-radius:4px; font-weight:800;">${t.s}</span>
                        <b style="color:${t.type==='anon'?'var(--anon)':'white'}">${t.n}</b>
                        <p style="margin-top:15px; color:#ccc; white-space:pre-wrap;">${t.m}</p>
                        ${t.img ? `<img src="${t.img}" onclick="openImg('${t.img}')">` : ''}
                        <div style="font-size:0.6rem; color:#444; margin-top:15px;">${t.date}</div>
                        <div class="card-actions">
                            ${t.img ? `<button class="btn-action btn-dl" onclick="downloadImg('${t.img}', '${t.n}')"><i class="fa-solid fa-download"></i></button>` : ''}
                            <button class="btn-action btn-del" onclick="deletePost(${t.id})"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>`;
                document.getElementById(t.type === 'feed' ? 'feed-container' : 'anon-container').innerHTML += card;
            });
        }
        loadPosts();
    </script>
</body>
</html>
